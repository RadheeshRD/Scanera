# ============================================================
# SCANERA backend - application.properties
# ============================================================

server.port=8081

# ============================================================
# Oracle Autonomous DB connection (via wallet / TCPS)
#
# WALLET_LOCATION is NOT a path you set manually. The wallet is
# bundled at src/main/resources/wallet/, and StockBackendApplication
# extracts it to a real, absolute temp directory on every startup
# (see WalletExtractor.java), then sets WALLET_LOCATION as a system
# property before Spring builds the DataSource. That's what this
# placeholder picks up - no relative "./wallet" fallback here on
# purpose, since a relative path is what caused ORA-12263 earlier.
#
# Only set WALLET_LOCATION yourself (env var or -D flag) if you want
# to point at a wallet on disk INSTEAD of the bundled one.
# ============================================================
oracle.tns.alias=${TNS_ALIAS:nnrkjjoq5vv5kf8w_high}
spring.datasource.url=jdbc:oracle:thin:@${oracle.tns.alias}?TNS_ADMIN=${WALLET_LOCATION}

# DB credentials - DO NOT hardcode in real deployments.
# Pass as environment variables: DB_USERNAME / DB_PASSWORD
spring.datasource.username=${DB_USERNAME:ADMIN}
spring.datasource.password=${DB_PASSWORD:Swathi123!@#}

spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Connection pool (HikariCP, bundled with Spring Boot)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# JPA / Hibernate - table already exists, never let Hibernate alter it
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.open-in-view=false

# Logging
logging.level.com.scanera=INFO

# ============================================================
# CORS - allow the static front-end (scanera.html) to call this API.
# Tighten this to your real domain in production.
# ============================================================
app.cors.allowed-origins=${CORS_ORIGINS:*}
